name: Container Images

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/container-images.yml"
      - "images/**"
      - "scripts/**"
      - "README.md"
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".dockerignore"
      - ".github/workflows/container-images.yml"
      - "images/**"
      - "scripts/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      wirestead_ref:
        description: "Wirestead tag, branch, or commit to install"
        required: false
        default: "v0.9.0-rc.2"

permissions:
  contents: read
  packages: write

env:
  DEFAULT_WIRESTEAD_REF: v0.9.0-rc.2
  IMAGE_NAME: ghcr.io/unilink-lab/wirestead-core

jobs:
  core:
    name: Build wirestead-core
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve Wirestead ref
        id: ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.wirestead_ref }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${DEFAULT_WIRESTEAD_REF}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/core/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            WIRESTEAD_REF=${{ steps.ref.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
